syntax = "proto3";

package kontext.agent.v1;

// AgentService handles session lifecycle and hook event streaming
// between the CLI sidecar and the Kontext backend.
//
// Authentication: the user's OIDC bearer token from `kontext login`.
// The backend verifies the JWT and derives org + user identity.
//
// Credential exchange uses the existing OAuth token exchange endpoint
// (POST /oauth2/token, RFC 8693) — not this service.
service AgentService {
  // ProcessHookEvent sends a single tool call event from the CLI to the
  // backend and receives a policy decision in return.
  rpc ProcessHookEvent(ProcessHookEventRequest) returns (ProcessHookEventResponse);

  // CreateSession establishes a governed agent session. Called once at the
  // start of `kontext start`.
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

  // BootstrapCli prepares the shared CLI application for credential
  // resolution and returns the managed preset providers the CLI should sync
  // into the local env file.
  rpc BootstrapCli(BootstrapCliRequest) returns (BootstrapCliResponse);

  // Heartbeat keeps the session alive. The sidecar sends heartbeats on an
  // interval; the backend marks sessions as disconnected if heartbeats stop.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // EndSession terminates the session.
  rpc EndSession(EndSessionRequest) returns (EndSessionResponse);
}

// --- Hook Events ---

message ProcessHookEventRequest {
  string session_id = 1;
  string agent = 2; // "claude", "cursor", "codex"
  string hook_event = 3; // "PreToolUse", "PostToolUse", "UserPromptSubmit"
  string tool_name = 4;
  bytes tool_input = 5; // JSON-encoded tool input
  bytes tool_response = 6; // JSON-encoded tool response (PostToolUse only)
  string tool_use_id = 7;
  string cwd = 8;
}

message ProcessHookEventResponse {
  Decision decision = 1;
  string reason = 2;
  string event_id = 3;
}

enum Decision {
  DECISION_UNSPECIFIED = 0;
  DECISION_ALLOW = 1;
  DECISION_DENY = 2;
  DECISION_ASK = 3; // Prompt user for approval
}

// --- Sessions ---

message CreateSessionRequest {
  string user_id = 1;
  string agent = 2; // "claude", "cursor", "codex"
  string hostname = 3;
  string cwd = 4;
  map<string, string> client_info = 5;
}

message CreateSessionResponse {
  string session_id = 1;
  string session_name = 2;
  string organization_id = 3;
  string agent_id = 4;
}

message BootstrapCliRequest {
  string agent_id = 1;
}

message BootstrapCliResponse {
  string application_id = 1;
  repeated ManagedProvider managed_providers = 2;
}

message ManagedProvider {
  string preset_key = 1;
  string handle = 2;
  string env_var = 3;
  string placeholder = 4;
  bool seed_on_first_run = 5;
}

message HeartbeatRequest {
  string session_id = 1;
}

message HeartbeatResponse {}

message EndSessionRequest {
  string session_id = 1;
}

message EndSessionResponse {}
