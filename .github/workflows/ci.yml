name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-setup-action@v1

      - name: Lint
        run: buf lint

      - name: Breaking change detection
        if: github.event_name == 'pull_request'
        run: buf breaking --against .git#branch=main
